<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PomoCare</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
  // GitHub Pages SPA redirect (rafgraph/spa-github-pages technique).
  // Redirects unknown paths to index.html with the original path preserved
  // in the query string, so the SPA can restore it via history.replaceState.
  (function () {
    var pathSegmentsToKeep = 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  })();
</script>
</head>
<body>
<p>Redirecting to <a href="/">PomoCare</a>...</p>
</body>
</html>
