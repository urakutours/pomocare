name = "pomocare-api"
# own (urakutours) account にピン留め — 未指定だと認証 account の default に落ちて
# 誤 account への deploy 事故が起きうる（CLAUDE.md「Cloudflare account 分離・確認」）。
account_id = "c36cc68ef81c11b24b7ee8f7de1604db"
main = "src/index.ts"
compatibility_date = "2025-03-28"
compatibility_flags = ["nodejs_compat"]

# Non-secret config for the Resend/FreeResend email fallback layer
# (src/lib/email.ts) + the pre-cutover smoke canary (src/routes/email-smoke-canary.ts).
# Left at safe no-op defaults: fallback disabled and canary disabled until the
# FreeResend host + control mailbox are actually provisioned.
[vars]
EMAIL_PRIMARY = "freeresend"
# Empty (not "none"): resolveProviderOrder() computes the fallback as the
# opposite of EMAIL_PRIMARY. An explicit "freeresend" here would collide with
# EMAIL_PRIMARY="freeresend" at cutover and null out the fallback (self-retry
# guard, email.ts resolveProviderOrder), silently disabling the resend safety net.
EMAIL_FALLBACK = ""
RESEND_BASE_URL = "https://mail-api.uraku.info/api"
SMOKE_CANARY_ENABLED = "false" # verification window closed after Phase C cutover
SMOKE_CANARY_MAILBOX = "relatista2026@gmail.com"

# Environment variables are set via `wrangler secret put <KEY>`
# Required secrets:
#   NEON_DATABASE_URL        - postgresql://user:pass@host/neondb
#   NEON_AUTH_URL            - Neon Auth endpoint (session verification)
#   STRIPE_SECRET_KEY        - Stripe API key
#   STRIPE_WEBHOOK_SECRET    - Stripe webhook signing secret
#   STRIPE_PRICE_STANDARD    - Price ID for Standard plan
#   STRIPE_PRICE_PRO         - Price ID for Pro plan
#   RESEND_API_KEY           - Resend API key (re_xxx)
#   RESEND_FROM              - From address (e.g. PomoCare <noreply@pomocare.com>)

# Optional:
#   STRIPE_PORTAL_CONFIG_ID  - Custom portal configuration
#   FREERESEND_API_KEY       - FreeResend API key (fallback provider; skipped with a warn log if unset)
#   SLACK_ALERT_WEBHOOK_URL  - Slack Incoming Webhook, notified when the email fallback fires
#   SMOKE_CANARY_SECRET      - Bearer secret gating POST /internal/email-smoke-canary

# Legacy (kept for rollback window, can be removed after 2026-06-13):
#   VAPID_SUBJECT / VAPID_PUBLIC_KEY / VAPID_PRIVATE_KEY — used by the old
#   server-side Web Push pipeline (cron + /schedule-notification + /send-push).
#   The pipeline was removed because tab-open delivery via Service Worker
#   showNotification() is sufficient for PomoCare's UX, and the 1-min cron was
#   polling Neon 24/7 and dominating Free tier CU-hrs. See migration file
#   `supabase/migrations/20260513_drop_push_notifications.sql`.

# Cron triggers are intentionally empty. Removing the previous `crons = ["* * * * *"]`
# entry by deleting this block was insufficient — per Cloudflare docs:
#   "If the `triggers` or `crons` property are undefined then the currently
#    deployed Cron Triggers are left in-place. To disable a Cron Trigger,
#    set `crons = []`."
# So we explicitly write an empty array to ensure no cron is ever attached
# to this Worker via wrangler deploy. If you ever need to add a cron back,
# document why and watch the Neon CU-hrs impact.
[triggers]
crons = []
